{% extends 'base.html' %}
{% block content %}

<style>
    .ngo-list-section {
        background: #ffffff;
        padding: 3rem 5%;
        margin-top: 2rem;
        margin-bottom: 2rem;
        border-radius: 12px;
    }

    .ngo-list {
        list-style: none;
        padding: 0;
        margin-top: 1.5rem;
    }

    .ngo-list li {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #ddd;
        transition: background 0.2s;
    }

    .ngo-list li:hover {
        background: var(--cream);
    }

    .ngo-list a {
        text-decoration: none;
        color: var(--dark-green);
        font-weight: bold;
        font-size: 1.1rem;
    }

    .ngo-list a:hover {
        text-decoration: underline;
    }
</style>

<div class="ngo-list-section">
    <h3>Registered NGOs</h3>
    <ul id="ngo-list-container" class="ngo-list">
        </ul>
    <p id="loading-status" style="text-align: center; color: #666;">Loading NGOs...</p>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    function loadNGOs() {
        $.ajax({
            url: '/api/ngo/profile/',
            type: 'GET',
            success: function(data) {
                let container = $('#ngo-list-container');
                container.empty();
                $('#loading-status').hide();

                if (data.length === 0) {
                    container.append('<li>No NGOs registered yet.</li>');
                    return;
                }

                data.forEach(function(ngo) {
                    let ngoHtml = `
                        <li>
                            <a href="/ngo/profile/${ngo.receiverID}/">${ngo.name}</a>
                        </li>
                    `;
                    container.append(ngoHtml);
                });
            },
            error: function(xhr) {
                $('#loading-status').text("Failed to load NGOs. Please ensure you are logged in as an NGO.").css("color", "red");
            }
        });
    }

    loadNGOs();
});
</script>

{% endblock %}
