{% extends 'base.html' %}

{% block content %}
<h2 style="text-align:center; color: var(--dark-green); margin-bottom: 0.4rem;">
    Donations
</h2>
<p style="text-align:center; color:#325827; margin-bottom: 1.8rem; font-size:0.98rem;">
    Together, we can build a stronger, more caring community - one donation at a time
</p>

<form id="filter-form" class="form-container" style="max-width: 800px; margin: 0 auto 2rem auto; display: flex; gap: 0.5rem; flex-wrap: wrap;">
  <input type="text" id="search-q" name="q" placeholder="Search donations or donor" 
         style="flex: 1; padding: 0.5rem; border-radius: 5px; border: 1px solid #ccc;">
  
  <select id="filter-category" name="category" style="padding: 0.5rem; border-radius: 5px; border: 1px solid #ccc;">
    <option value="">All Categories</option>
    <option value="food">Food</option>
    <option value="clothes">Clothes</option>
    <option value="furniture">Furniture</option>
    <option value="electronics">Electronics</option>
    <option value="others">Others</option>
  </select>

  <select id="filter-status" name="status" style="padding: 0.5rem; border-radius: 5px; border: 1px solid #ccc;">
    <option value="">All Status</option>
    <option value="available">Available</option>
    <option value="claimed">Claimed</option>
    <option value="expired">Expired</option>
  </select>
  <button type="submit" class="btn btn-success">Filter</button>
</form>

<div id="donation-list-container" style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 900px; margin: 0 auto;">
    <p style="text-align: center;">Loading donations...</p>
</div>

<!-- Donor Profile Modal -->
<div id="donor-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background-color: white; border-radius: 10px; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
        <button id="close-modal" style="float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666;">&times;</button>
        <div id="donor-modal-content">
            <p style="text-align: center;">Loading donor profile...</p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    const isAuthenticated = "{{ request.user.is_authenticated|yesno:'true,false' }}" === "true";
    const userRole = "{{ request.user.role|default:'' }}";

    function loadDonations(params = {}) {
        $.ajax({
            url: '/api/core/donations/', 
            type: 'GET',
            data: params,
            success: function(data) {
                let container = $('#donation-list-container');
                container.empty();

                if (!data || data.length === 0) {
                    container.append('<p style="text-align: center;">No donations found.</p>');
                    return;
                }

                data.forEach(function(donation) {
                    // RESTORED: Image logic from old code
                    let imageHtml = '';
                    if (donation.image) {
                        imageHtml = `
                        <div style="flex: 0 0 300px; max-height: 300px; overflow: hidden;">
                          <img src="${donation.image}" alt="${donation.title}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 7%;">
                        </div>`;
                    }

                    let donationHtml = `
                    <div class="donation-card" style="display: flex; gap: 1rem; background-color: #fdf6e3; border-radius: 10px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 1.5rem;">
                        ${imageHtml}
                        <div style="flex: 1; padding: 1rem;">
                            <h3 style="margin-top: 0; color: var(--dark-green);">${donation.title}</h3>
                            <p><strong>Category:</strong> ${donation.category_display || donation.category}</p>
                            <p><strong>Status:</strong> ${donation.status_display || donation.status}</p>
                            <p><strong>Description:</strong> ${donation.description}</p>
                            <p><strong>Quantity:</strong> ${donation.quantity}</p>
                            <p><strong>Location:</strong> ${donation.location}</p>
                            <p><strong>Expiry Date:</strong> ${donation.expiry_date}</p>
                            <p><strong>Date Posted:</strong> ${donation.date_created}</p>
                            <p><strong>Donor:</strong>
                                <a href="#" class="donor-profile-link" data-donor-id="${donation.donor}" style="color: var(--medium-green);">
                                    ${donation.donor_username || 'View Profile'}
                                </a>
                            </p>
                            <div class="action-section">
                                ${renderActionSection(donation)}
                            </div>
                        </div>
                    </div>`;
                    
                    container.append(donationHtml);
                });
            },
            error: function(xhr) {
                console.error("API Error:", xhr.responseText);
            }
        });
    }

    function renderActionSection(donation) {
        if (!isAuthenticated) {
            return '<p style="margin-top:1rem; color:#666;">Login as an NGO to request this donation.</p>';
        }
        
        if (userRole === 'ngo') {
            if (donation.status === 'claimed') {
                return '<p style="margin-top:1rem; color:#b23b3b; font-weight:bold;">Item already claimed.</p>';
            } else if (donation.status === 'expired') {
                return '<p style="margin-top:1rem; color:#b23b3b; font-weight:bold;">This donation has expired and cannot be requested.</p>';
            } else {
                return '<button class="btn btn-success request-btn" data-id="' + donation.id + '" style="margin-top: 1rem;">Request Donation</button>';
            }
        }
        return ''; 
    }

    function showDonorProfile(donorId) {
        $.ajax({
            url: `/api/donor/profile/${donorId}/`,
            type: 'GET',
            success: function(data) {
                let donorHtml = `
                    <h2 style="color: var(--dark-green); margin-top: 0;">Donor Profile</h2>
                    <p><strong>Username:</strong> ${data.user_username}</p>
                    <p><strong>Email:</strong> ${data.user_email}</p>
                    <p><strong>Phone No:</strong> ${data.user_phone_no}</p>
                `;
                $('#donor-modal-content').html(donorHtml);
                $('#donor-modal').css('display', 'flex');
            },
            error: function(xhr) {
                let errorMsg = 'Could not load donor profile.';
                if (xhr.responseJSON && xhr.responseJSON.error) {
                    errorMsg = xhr.responseJSON.error;
                }
                $('#donor-modal-content').html(`<p style="color: red; text-align: center;">${errorMsg}</p>`);
                $('#donor-modal').css('display', 'flex');
            }
        });
    }

    loadDonations();

    $('#filter-form').on('submit', function(e) {
        e.preventDefault();
        loadDonations({
            q: $('#search-q').val(),
            category: $('#filter-category').val(),
            status: $('#filter-status').val()
        });
    });

    $(document).on('click', '.donor-profile-link', function(e) {
        e.preventDefault();
        const donorId = $(this).data('donor-id');
        showDonorProfile(donorId);
    });

    $('#close-modal, #donor-modal').on('click', function(e) {
        if (e.target.id === 'donor-modal' || e.target.id === 'close-modal') {
            $('#donor-modal').css('display', 'none');
        }
    });

    $(document).on('click', '.request-btn', function() {
        const donationId = $(this).data('id');
        $.ajax({
            url: '/api/core/claim-requests/create/',
            type: 'POST',
            data: JSON.stringify({ donation: donationId }),
            contentType: 'application/json',
            headers: { "X-CSRFToken": "{{ csrf_token }}" },
            success: function() {
                alert("Donation request submitted successfully!");
                loadDonations();
            },
            error: function(xhr) {
                alert("Could not process request: " + xhr.responseText);
            }
        });
    });
});
</script>
{% endblock %}
